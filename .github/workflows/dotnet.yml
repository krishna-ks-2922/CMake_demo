name: NET Application

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  dotnet-build-run:
    runs-on:
      - self-hosted
      - linux

    env:
      DOTNET_INSTALL_DIR: ${{ runner.temp }}/dotnet

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Self-Hosted Runner
        run: |
          echo "Runner OS: $RUNNER_OS"
          echo "Current user:"
          whoami
          echo "Hostname:"
          hostname
          echo "Working directory:"
          pwd

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Check .NET Version
        run: |
          dotnet --version
          dotnet --info

      - name: Restore Dependencies
        working-directory: dotnet-app
        run: dotnet restore DotNetApp.csproj

      - name: Build Application
        working-directory: dotnet-app
        run: dotnet build DotNetApp.csproj --configuration Release --no-restore

      - name: Run Application
        working-directory: dotnet-app
        run: dotnet run --project DotNetApp.csproj --configuration Release --no-build
